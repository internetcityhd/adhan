name: "Copilot Setup Steps"

on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    copilot-setup-steps:
        runs-on: ubuntu-latest
        # Try with larger runners if available in your organization
        # runs-on: ubuntu-8-core

        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v5
              with:
                  submodules: recursive

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "yarn"

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "17"

            - name: Set up Android SDK
              uses: android-actions/setup-android@v3
              with:
                  api-levels: "34,35"
                  build-tools: "34.0.0"
                  ndk-version: "27.3.13750724"

            - name: Install Yarn dependencies
              run: YARN_ENABLE_IMMUTABLE_INSTALLS=false yarn install

            - name: Setup lingui config
              run: cp lingui.config.js.example lingui.config.js

            - name: Compile translations
              run: yarn lingui compile

            - name: Make Gradlew Executable
              run: cd android && chmod +x ./gradlew

            - name: Patch notifee rn package
              run: |
                sed -E -i 's/^.*(fabric|com\.(crashlytics|google\.(firebase|android.gms))).*$//g' ./node_modules/@notifee/react-native/android/build.gradle

            - name: Patch React Native Gradle Plugin for compatibility
              run: |
                if grep -q "import org.gradle.configurationcache.extensions.serviceOf" ./node_modules/@react-native/gradle-plugin/react-native-gradle-plugin/build.gradle.kts; then
                  sed -i '10s/^/\/\/ /' ./node_modules/@react-native/gradle-plugin/react-native-gradle-plugin/build.gradle.kts
                  sed -i '52,58s/^/\/\/ /' ./node_modules/@react-native/gradle-plugin/react-native-gradle-plugin/build.gradle.kts
                fi
